name: FiapVideos CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Força Node.js 24

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package -DskipTests

      - name: List target directory
        run: ls -la target/

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build -t rodrigoamora/rodrigo-springboot:latest .
          docker tag rodrigoamora/rodrigo-springboot:latest rodrigoamora/rodrigo-springboot:${{ github.sha }}
          docker push rodrigoamora/rodrigo-springboot:latest
          docker push rodrigoamora/rodrigo-springboot:${{ github.sha }}

      - name: Copy files to EC2
        if: github.ref == 'refs/heads/main'
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USERNAME: ${{ secrets.EC2_USERNAME }}
        run: |
          echo "$PRIVATE_KEY" > private_key.pem
          chmod 600 private_key.pem
          
          # Cria pasta no servidor
          ssh -o StrictHostKeyChecking=no -i private_key.pem ${USERNAME}@${HOST} "
            mkdir -p ~/app
          "
          
          # Copia arquivos (IMPORTANTE: copia a pasta prometheus inteira)
          scp -o StrictHostKeyChecking=no -i private_key.pem -r \
            docker-compose.yml prometheus \
            ${USERNAME}@${HOST}:~/app/
          
          
          # Deploy
          ssh -o StrictHostKeyChecking=no -i private_key.pem ${USERNAME}@${HOST} '
            cd ~/app && \
            docker-compose down || true && \
            docker-compose pull && \
            docker-compose up -d && \
            docker-compose ps
          '
          
          rm -f private_key.pem

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p ~/app
            cd ~/app
            docker-compose pull
            docker-compose up -d
            docker-compose logs --tail=100
